<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Debug Animation</title>
<link rel="stylesheet" href="assets/vendor/fonts/vazirmatn.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/chat.css">
<style>
body { padding: 40px; background: #07070d; }
.chat-messages { display: flex; flex-direction: column; gap: 14px; }
</style>
</head>
<body class="has-chat">
<div class="chat-messages">

  <!-- ساختار دقیق همان چیزی که JS می‌سازد -->
  <div class="message assistant typing-msg">
    <div class="avatar">
      <img src="assets/img/logo.png" width="34" height="34" alt="">
    </div>
    <div class="message-wrap">
      <div class="thinking-bubble">
        <div class="thinking-header">
          <div class="thinking-brain">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
              <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.5"/>
              <path d="M12 8v4l3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="thinking-status">
            <div class="thinking-status-title">در حال فکر کردن</div>
            <div class="thinking-status-sub">پیام دریافت شد...</div>
          </div>
          <div class="thinking-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
        <div class="thinking-steps">
          <div class="t-step done"><span class="t-step-dot"></span><span>دریافت سوال</span></div>
          <div class="t-step active"><span class="t-step-dot"></span><span>تحلیل و بررسی</span></div>
          <div class="t-step"><span class="t-step-dot"></span><span>نوشتن پاسخ</span></div>
        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
